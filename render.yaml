services:
  # Backend API Service
  - type: web
    name: honeycloud-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.prod.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: honeycloud-db 
          property: connectionString
      - key: FRONTEND_URL
        value: https://honeycloud-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHONUNBUFFERED
        value: "1"

  # Frontend Static Site
  - type: web
    env: static
    name: honeycloud-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: https://honeycloud-backend.onrender.com/api/*
      - type: rewrite
        source: /health
        destination: https://honeycloud-backend.onrender.com/health
      - type: rewrite
        source: /docs
        destination: https://honeycloud-backend.onrender.com/docs
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: honeycloud-db
    databaseName: honeycloud
    user: honeycloud
    region: oregon
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere