services:
  # Backend API Service
  - type: web
    name: honeycloud-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.prod.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: honeycloud-db 
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: honeycloud-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://honeycloud-frontend.onrender.com # Change this if you use a custom domain
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: 1

  # Frontend Static Site
  - type: static
    name: honeycloud-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: rewrite
        source: /health
        destination: /health
      - type: rewrite
        source: /docs
        destination: /docs

  # Redis Cache
  - type: redis
    name: honeycloud-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: honeycloud-db
    databaseName: honeycloud
    user: honeycloud
    region: oregon
    plan: starter