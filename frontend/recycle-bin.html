<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle Bin | HoneyCloud-X</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="css/design-system.css?v=3.0.0">
    
    <script src="config.js?v=3.0.0"></script>
    <script src="js/app.js?v=3.0.0"></script>
</head>
<body class="app-layout">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation"></aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Topbar -->
        <header class="topbar"></header>

        <!-- Page Content -->
        <div class="page-content">
            
            <div class="flex justify-between items-center mb-24">
                <div>
                    <h3 class="mb-4">Recycle Bin</h3>
                    <p class="text-sm text-secondary">Items here will be permanently deleted after your configured retention period (default 30 days).</p>
                </div>
                <div class="flex gap-12">
                    <button class="btn btn-secondary" onclick="recycleBin.restoreAll()">Restore All</button>
                    <button class="btn btn-danger" onclick="recycleBin.emptyBin()">Empty Recycle Bin</button>
                </div>
            </div>

            <!-- Deleted Items -->
            <div class="card">
                <div class="card-body-flush">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px"><input type="checkbox" id="selectAllBin" class="w-4 h-4"></th>
                                    <th>Item Type</th>
                                    <th>Description</th>
                                    <th>Deleted At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="binBody">
                                <tr>
                                    <td colspan="5" class="text-center p-24 text-muted">Loading recycle bin...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Bulk Actions Banner (Hidden by default) -->
            <div id="bulkActionsBanner" class="hidden mt-16 p-16 bg-surface-hover rounded border border-white/5 flex justify-between items-center" style="display: none;">
                <span class="text-sm font-bold"><span id="selectedCount">0</span> items selected</span>
                <div class="flex gap-8">
                    <button class="btn btn-secondary btn-sm" onclick="recycleBin.restoreSelected()">Restore Selected</button>
                    <button class="btn btn-danger btn-sm" onclick="recycleBin.deleteSelected()">Permanently Delete</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/recycle-bin.js?v=3.0.0"></script>
</body>
</html>
