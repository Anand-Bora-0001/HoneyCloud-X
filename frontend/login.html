<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneyCloud | Secure Authentication</title>
    <link rel="stylesheet" href="static/css/premium.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-glow {
            box-shadow: 0 0 100px -20px var(--cyan-glow);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-black">
    <div class="scanline fixed inset-0 pointer-events-none"></div>
    
    <div class="glass-card w-full max-w-md p-10 login-glow animate-fade-in relative z-10">
        <div class="text-center mb-10">
            <div class="inline-block px-3 py-1 border border-cyan-400/30 rounded-full text-[10px] text-cyan-400 tracking-[0.4em] mb-4 uppercase">
                Secure Environment
            </div>
            <h1 class="text-5xl font-black tracking-tighter glow-text-cyan mb-2">HONEYCLOUD</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Distributed SIEM Platform v2.0</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2 ml-1">Operator ID</label>
                <input type="text" id="username" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400/50 transition font-mono"
                    placeholder="ENTER ID">
            </div>
            
            <div>
                <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2 ml-1">Security Cipher</label>
                <input type="password" id="password" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400/50 transition font-mono"
                    placeholder="••••••••">
            </div>

            <button type="submit" class="w-full btn-outline-cyan py-4 rounded-xl text-sm font-bold mt-4">
                INITIALIZE COMMAND SESSION
            </button>
        </form>

        <div id="errorMessage" class="mt-6 text-center text-red-500 text-xs font-bold uppercase tracking-widest hidden">
            Invalid Credentials
        </div>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <div class="text-[10px] text-gray-600 uppercase tracking-widest">
                Protected by Advanced ML Threat Detection
            </div>
        </div>
    </div>

    <script>
        // Inline configuration to prevent caching/loading issues
        const CONFIG = {
            API_BASE: window.location.origin,
            VERSION: '2.0.0'
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = 'VERIFYING...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                console.log('[Login] Attempting login at:', `${CONFIG.API_BASE}/auth/login`);
                const response = await fetch(`${CONFIG.API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password })
                });

                console.log('[Login] Server responded with status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    console.log('[Login] Success! Token received. Redirecting...');
                    localStorage.setItem('hc_token', data.access_token);
                    
                    // Force redirect to absolute path
                    window.location.replace('/index.html');
                } else {
                    const err = await response.json();
                    console.error('[Login] Failed:', err);
                    document.getElementById('errorMessage').innerText = err.detail || 'Access Denied';
                    document.getElementById('errorMessage').classList.remove('hidden');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('[Login] Error:', error);
                document.getElementById('errorMessage').innerText = 'Connection Error';
                document.getElementById('errorMessage').classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
