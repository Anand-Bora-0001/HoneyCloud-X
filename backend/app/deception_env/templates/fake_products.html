
{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 15px;">
    <a href="/deception/export/products" class="btn">Export CSV</a>
</div>
<table>
    <tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr>
    {% for p in products %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>${{ p.price }}</td>
        <td>{{ p.stock }}</td>
        <td><button class="btn" style="background: #007bff;">Edit</button></td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
