
{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 15px;">
    <a href="/deception/export/customers" class="btn">Export CSV</a>
</div>
<table>
    <tr><th>ID</th><th>Name</th><th>Email</th><th>Spend</th></tr>
    {% for c in customers %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td>${{ c.spend }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
