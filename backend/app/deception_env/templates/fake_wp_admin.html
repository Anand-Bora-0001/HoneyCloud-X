<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Log In &lsaquo; WordPress</title>
    <style>
        body { background: #f1f1f1; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif; }
        .login-box { width: 320px; margin: 8% auto; padding: 8% 0; }
        .login-box h1 { text-align: center; }
        .login-box form { background: #fff; border: 1px solid #ccd0d4; padding: 26px 24px 46px; }
        .login-box input[type="text"], .login-box input[type="password"] { width: 100%; padding: 3px 5px; font-size: 24px; }
        .login-box .button { background: #007cba; border-color: #007cba; color: #fff; padding: 4px 12px; font-size: 14px; border-radius: 3px; border: 1px solid; cursor: pointer; float: right; }
        .error { border-left: 4px solid #dc3232; background: #fff; box-shadow: 0 1px 1px 0 rgba(0,0,0,.1); margin: 0 0 20px; padding: 12px; }
    </style>
</head>
<body class="login">
    <div class="login-box">
        <h1>WordPress</h1>
        {% if error %}
        <div class="error"><p><strong>ERROR</strong>: {{ error }}</p></div>
        {% endif %}
        <form name="loginform" id="loginform" action="/deception/wp-admin" method="post">
            <p>
                <label for="user_login">Username or Email Address</label>
                <input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" />
            </p>
            <p>
                <label for="user_pass">Password</label>
                <input type="password" name="pwd" id="user_pass" class="input" value="" size="20" />
            </p>
            <p class="submit">
                <input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Log In" />
            </p>
        </form>
    </div>
</body>
</html>
