
<!DOCTYPE html>
<html>
<head>
    <title>{{ title | default('Admin Panel') }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; }
        .sidebar { width: 250px; background: #343a40; color: white; height: 100vh; position: fixed; }
        .sidebar a { display: block; color: #c2c7d0; padding: 15px; text-decoration: none; border-bottom: 1px solid #4f5962; }
        .sidebar a:hover { background: #4f5962; color: white; }
        .content { margin-left: 250px; padding: 20px; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #dee2e6; margin-bottom: 20px; display: flex; justify-content: space-between;}
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .btn { background: #28a745; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .metric-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 5px; flex: 1; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 style="padding: 15px; margin:0; background: #23272b;">Internal Systems v2.1</h3>
        <a href="/deception/fake-admin">Dashboard</a>
        <a href="/deception/fake-products">Inventory</a>
        <a href="/deception/fake-customers">Customers</a>
        <a href="/deception/export/all" style="color: #e74c3c;">System Backup</a>
    </div>
    <div class="content">
        <div class="header">
            <h2>{{ title | default('Admin') }}</h2>
            <div>Logged in as: SuperAdmin</div>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
