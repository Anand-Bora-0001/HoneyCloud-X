version: '3.8'

services:
  # ========================
  # Backend API Service
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeycloud-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://honeycloud:honeycloud_secret@db:5432/honeycloud
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-to-a-strong-random-string-at-least-32-chars}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DEBUG=false
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-reports:/app/reports
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========================
  # Frontend (Nginx)
  # ========================
  frontend:
    image: nginx:alpine
    container_name: honeycloud-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ========================
  # PostgreSQL Database
  # ========================
  db:
    image: postgres:15-alpine
    container_name: honeycloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=honeycloud
      - POSTGRES_USER=honeycloud
      - POSTGRES_PASSWORD=honeycloud_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeycloud -d honeycloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis Cache
  # ========================
  redis:
    image: redis:7-alpine
    container_name: honeycloud-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  backend-reports:
  backend-logs:
